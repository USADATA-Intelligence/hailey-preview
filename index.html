.bub{max-width:82%;padding:12px 16px;font-size:14px;line-height:1.6;word-break:break-word;}
.bub-h{border-radius:18px 18px 18px 4px;background:#FFF;color:#1A202C;box-shadow:0 1px 6px rgba(0,0,0,.05);border:1px solid #E8EDF2;}
.bub-u{border-radius:18px 18px 4px 18px;background:#1565C0;color:#FFF;box-shadow:0 2px 10px rgba(21,101,192,.18);max-width:72%;}
.typing{display:flex;gap:5px;padding:8px 0;align-items:center;}
.typing span{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#0FCCB0,#2DD87B);animation:bp 1.4s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.18s;}
.typing span:nth-child(3){animation-delay:.36s;}
@keyframes bp{0%,60%,100%{transform:translateY(0) scale(.85);opacity:.35}30%{transform:translateY(-5px) scale(1);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;padding-left:44px;}
.chip{padding:8px 16px;border-radius:22px;border:1.5px solid #C5CED8;background:#FFF;color:#1A202C;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.chip:hover{background:#E8EDF2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.12);}
.chip-g{background:#2DD87B;color:#FFF;border-color:#2DD87B;}
.chip-g:hover{background:#00B248;}
.chip-a{background:#1565C0;color:#FFF;border-color:#1565C0;}
.chip-a:hover{background:#0D47A1;}
.chip-on{background:#1565C0;color:#FFF;border-color:#1565C0;}
.svc{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;cursor:pointer;background:#FFF;border:1.5px solid #C5CED8;transition:all .15s;width:100%;text-align:left;font-family:'DM Sans',sans-serif;margin-bottom:8px;}
.svc:hover{background:#F4F7FA;}
.svc-sel{background:#E8F5E9;border-color:#2DD87B;}
.svc-name{font-size:13px;font-weight:600;color:#1A202C;}
.svc-desc{font-size:11px;color:#8495A8;margin-top:1px;}
.count-card{border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1px solid #E8EDF2;}
.count-top{background:linear-gradient(135deg,#070F1A 0%,#0A1628 50%,#0F2847 100%);padding:22px 20px;position:relative;overflow:hidden;}
.count-glow{position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(45,216,123,.15),transparent 70%);}
.count-label{font-size:10px;font-weight:700;color:#0FCCB0;text-transform:uppercase;letter-spacing:1.5px;}
.count-num{color:#FFF;font-size:38px;font-weight:700;margin-top:6px;transition:all .3s;}
.count-sub{color:#8495A8;font-size:14px;font-weight:400;}
.count-meta{display:flex;gap:16px;margin-top:12px;}
.count-ml{font-size:10px;color:#8495A8;text-transform:uppercase;letter-spacing:.8px;}
.count-mv{font-size:13px;color:#FFF;font-weight:600;margin-top:2px;}
.count-bot{padding:16px 20px;background:#FFF;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tags-label{font-size:10px;font-weight:700;color:#8495A8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.tag{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;background:#F4F7FA;color:#4A5568;border:1px solid #E8EDF2;}
.intel{display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(135deg,#F0FFF4,#E8F5E9);border-radius:10px;border:1px solid #C8E6C9;margin-top:10px;}

.inp-btn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#0FCCB0,#2DD87B,#A8E063);color:#FFF;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(45,216,123,.3);flex-shrink:0;}
.tagline{padding:0 14px 8px;display:flex;justify-content:center;}
.tagline span{font-size:9px;font-weight:600;letter-spacing:3px;color:#C5CED8;text-transform:lowercase;}

.log-panel{background:#0A1628;padding:16px;border-bottom:1px solid rgba(79,195,247,0.15);max-height:280px;overflow-y:auto;}
.log-title{font-size:10px;font-weight:700;color:#4FC3F7;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.log-item{margin-bottom:8px;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px;border:1px solid rgba(255,255,255,0.06);font-size:11px;}

.log-btn{background:rgba(79,195,247,0.08);border:1px solid rgba(79,195,247,0.2);border-radius:6px;padding:3px 8px;cursor:pointer;font-size:9px;font-weight:700;color:#4FC3F7;letter-spacing:.5px;font-family:'DM Sans',sans-serif;}

function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":String(n);}

function getCount(geography, selections){
  var body = {tableName:"consumer"};
  if(geography) body.geography = geography;
  if(selections && selections.length > 0) body.selections = selections;
  return fetch(API+"/api/count",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();});
}

function buildSelections(){
  var d = IND[S.ind];
  var sels = d.baseline.map(function(b){return{id:b.id,description:b.d,values:b.v};});
  var replaced = {};
  // Check for replacements
  d.refinements.forEach(function(r){
    if(r.active && r.replaces) replaced[r.replaces] = true;
  });
  // Remove replaced baseline selections
  if(Object.keys(replaced).length > 0){
    sels = sels.filter(function(s){return !replaced[s.id];});
  }
  // Add active refinements
  d.refinements.forEach(function(r){
    if(r.active){
      sels.push({id:r.id,description:r.label,values:r.v});
    }
  });
  return sels;
}

function getActiveFilterLabels(){
  var d = IND[S.ind];
  var labels = d.baseFilters.slice();
  var replacedBase = {};
  d.refinements.forEach(function(r){
    if(r.active && r.replaces){
      // Find which base filter to replace by matching the API id
      d.baseline.forEach(function(b,i){
        if(b.id === r.replaces) replacedBase[i] = r.label;
      });
    }
  });
  // Apply replacements
  Object.keys(replacedBase).forEach(function(i){
    labels[parseInt(i)] = replacedBase[parseInt(i)];
  });
  // Add non-replacing refinements
  d.refinements.forEach(function(r){
    if(r.active && !r.replaces) labels.push(r.label);
  });
  return labels;
}

      else if(S.geo==='State') ph="State abbreviation (e.g., NJ)";

  } else {
    h += '<div class="foot"><span>activate. accelerate. amplify.</span></div>';

}

function say(txt, delay){
  return new Promise(function(resolve){
    S.typing = true; render();
    setTimeout(function(){
      S.typing = false;
      S.msgs.push({c:txt,u:false});
      render();
      resolve();
    }, delay || 800);
  });
}

function addUser(txt){ S.msgs.push({c:txt,u:true}); render(); }

var HAILEY_SYSTEM = "You are Hailey, USADATA's audience intelligence assistant. You help businesses find prospects using USADATA's 260M+ consumer database. You are confident, conversational, and knowledgeable. You sound like a smart data consultant, not a chatbot.\n\nRULES:\n- Keep responses to 2-3 sentences max. Be concise and punchy.\n- NEVER mention propensity models, Personicx segments, Acxiom, or any data suppliers.\n- NEVER use em-dashes, bullet points, or typical AI phrasing.\n- Present everything as USADATA proprietary intelligence.\n- Sound like a human consultant who has done this hundreds of times.\n- Reference specific, practical advice for the industry.\n- Do not use phrases like 'I understand' or 'Great question' or 'Absolutely'.\n- Do not repeat information already shown in the conversation.";

function askClaude(prompt) {
  return fetch(API + "/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      system: HAILEY_SYSTEM,
      prompt: prompt
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    return data.text || null;
  })
  .catch(function(e) {
    console.error("Claude API error:", e);
    return null;
  });
}

async function sayFromClaude(prompt, fallback) {
  S.typing = true; render();
  var response = await askClaude(prompt);
  S.typing = false;
  if (response) {
    S.msgs.push({ c: response, u: false });
  } else if (fallback) {
    S.msgs.push({ c: fallback, u: false });
  }
  render();
}

function getBaselineCommentary(industry, count, geo, detail) {

  if (count > 500000) {

    sizeComment = pick(["Solid audience size. Big enough to segment across channels, focused enough to drive real response rates.", "That is a workable number. Large enough for a multi-channel campaign but not so big that your budget gets spread thin.", "Nice volume. This gives you room to test different messages and offers across segments."]);
  } else if (count > 5000) {
    sizeComment = pick(["Good volume for a targeted campaign. This is a workable audience for direct mail, email, or digital.", "That is a solid campaign audience. Enough to generate measurable results without overextending your budget.", "Right in the sweet spot. This audience is large enough to matter but small enough to keep costs manageable."]);
  } else if (count > 500) {
    sizeComment = pick(tips.smallCount);
  } else {
    sizeComment = pick(["That is a very niche audience. High quality, but if you need more volume we can loosen the geography or adjust filters.", "Very targeted. Every prospect here is a strong match, but consider widening your geography if you need more reach.", "Tight list. The quality will be high, but you might want to broaden your area to give your campaign more scale."]);

function getRefinementCommentary(industry, oldCount, newCount, filterLabel, added) {
  if (!added) {
    if (newCount > oldCount * 1.5) {
      return pick([
        "Removing <strong>" + filterLabel + "</strong> opened things up. " + fmt(newCount - oldCount) + " more prospects back in your audience.",
        "That loosened things up nicely. You gained " + fmt(newCount - oldCount) + " prospects by removing <strong>" + filterLabel + "</strong>.",
        "Wider net now. Removing that filter brought " + fmt(newCount - oldCount) + " more households into play."
      ]);
    }
    return "";
  }
  var dropPct = oldCount > 0 ? Math.round((1 - newCount / oldCount) * 100) : 0;
  if (newCount === 0) {
    return pick([
      "That combination returned zero results. Try removing <strong>" + filterLabel + "</strong> or loosening another filter.",
      "No matches with that filter active. The criteria might be too tight for this geography. Try removing <strong>" + filterLabel + "</strong>."
    ]);
  }
  if (dropPct > 70) {
    return pick([
      "That is a significant narrowing. <strong>" + filterLabel + "</strong> cut your audience by " + dropPct + "%. Very targeted, but make sure you have enough volume for your campaign.",
      "<strong>" + filterLabel + "</strong> dropped the count by " + dropPct + "%. That is a precision audience. Great for response rates, but watch your volume.",
      "Big cut. " + dropPct + "% of the audience did not match <strong>" + filterLabel + "</strong>. If that is too tight, toggle it off and try a different filter."
    ]);
  }
  if (dropPct > 40) {
    return pick([
      "Good refinement. <strong>" + filterLabel + "</strong> trimmed about " + dropPct + "% of the audience. What is left is a much stronger fit.",
      "Solid narrowing. You lost about " + dropPct + "% but what remains is a higher-quality audience for your campaign.",
      "<strong>" + filterLabel + "</strong> focused the list by " + dropPct + "%. These remaining prospects are a better match for what you are selling."
    ]);
  }
  if (dropPct > 15) {
    return pick([
      "<strong>" + filterLabel + "</strong> tightened things up by about " + dropPct + "%. Getting closer to your ideal prospect.",
      "Moderate refinement. " + dropPct + "% trimmed. The audience quality just went up.",
      "Nice adjustment. <strong>" + filterLabel + "</strong> removed " + dropPct + "% of lower-fit households."
    ]);
  }
  if (dropPct > 0) {
    return pick([
      "<strong>" + filterLabel + "</strong> made a small adjustment. Most of your audience already met that criteria, which is a good sign.",
      "Minor trim. Most of these households already matched <strong>" + filterLabel + "</strong>. Your baseline targeting was already well-aligned.",
      "Only " + dropPct + "% drop. That tells me your core audience is naturally strong on <strong>" + filterLabel + "</strong>."
    ]);
  }
  return "";
}

  if (count > 100000) {

  } else if (count > 10000) {

  } else if (count > 1000) {
    lines.push(pick(["At " + fmt(count) + " prospects, you are in precision territory. Every household here is a strong match. A personalized approach will convert.", fmt(count) + " high-quality prospects. This is the kind of list where personalization and multiple touches really pay off.", "Focused list of " + fmt(count) + ". Consider a multi-touch campaign: mail first, then follow up with email or digital retargeting."]));

      }
      S.step = 'refine'; render();

      S.step = 'geo'; render();

  } catch(e){

    S.step = 'geo'; render();
  }
}

async function toggleRef(idx){
  if(S.updating) return;
  var d = IND[S.ind];
  var ref = d.refinements[idx];
  var oldCount = S.cnt;
  var wasActive = ref.active;

  // Handle "replaces" logic
  if(!ref.active && ref.replaces){
    d.refinements.forEach(function(r,i){
      if(i !== idx && r.active && r.replaces === ref.replaces) r.active = false;
      if(i !== idx && r.active && r.id === ref.id && r.replaces) r.active = false;
    });
  }
  if(!ref.active && !ref.replaces){
    d.refinements.forEach(function(r,i){
      if(i !== idx && r.active && r.replaces === ref.id) r.active = false;
    });
  }

  ref.active = !ref.active;
  S.updating = true; render();

  try{
    var sels = buildSelections();
    var result = await getCount(S.geoObj, sels);
    if(result.success){
      S.cnt = result.count; S.cntId = result.countId;
      if(S.bLog){
        S.bLog.count = result.count;
        S.bLog.countId = result.countId;
        S.bLog.filters = getActiveFilterLabels();
        S.bLog.selections = sels;
      }
      // Add commentary on significant changes
      var comment = getRefinementCommentary(S.ind, oldCount, result.count, ref.label, !wasActive);
      if(comment){
        S.updating = false; render();
        await say(comment, 600);
        return;
      }
    }
  } catch(e){
    console.error("Refinement error:", e);
  }
  S.updating = false; render();
}

async function removeLastFilter(){
  var d = IND[S.ind];
  // Find the last active refinement and deactivate it
  for(var i = d.refinements.length - 1; i >= 0; i--){
    if(d.refinements[i].active){
      var label = d.refinements[i].label;
      d.refinements[i].active = false;
      S.updating = true; render();
      try{
        var sels = buildSelections();
        var result = await getCount(S.geoObj, sels);
        if(result.success){
          var oldCnt = S.cnt;
          S.cnt = result.count; S.cntId = result.countId;
          if(S.bLog){ S.bLog.count = result.count; S.bLog.countId = result.countId; S.bLog.filters = getActiveFilterLabels(); S.bLog.selections = sels; }

    }).then(function(r){ return r.json(); }).then(function(data){
      console.log("[LEAD SUBMITTED]", data);
    }).catch(function(e){
      console.error("[LEAD ERROR]", e);
    });
  } catch(e) {
    console.error("[LEAD ERROR]", e);
  }

  await say("Perfect. A USADATA Data Specialist will be in touch shortly to finalize your <strong>"+fmt(S.cnt)+"</strong> prospect audience"+(S.svs.length>0?" and discuss your campaign services":"")+".", 900);
  await say("You can also reach us at <strong>(800) 399-8611</strong> or visit <strong>usadata.com</strong>. Thanks for using Hailey!", 700);
  S.step = 'done'; render();
}

async function restart(){
  S = {step:"welcome",msgs:[],ind:null,geo:null,geoObj:null,det:"",cnt:null,cntId:null,svs:[],typing:false,showInp:false,bLog:null,showLog:false,refining:false,updating:false,activeRefinements:[]};
  render(); await init();
}

function toggleLog(){ S.showLog = !S.showLog; render(); }

init();
</script>
