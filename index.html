<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#F4F7FA;height:100vh;display:flex;justify-content:center;}
.app{max-width:480px;width:100%;height:100vh;display:flex;flex-direction:column;background:#F4F7FA;position:relative;box-shadow:0 0 60px rgba(0,0,0,.06);}
.hdr{background:linear-gradient(135deg,#070F1A 0%,#0A1628 50%,#0F2847 100%);border-bottom:1px solid rgba(45,216,123,.15);}
.hdr-top{padding:8px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{color:#FFF;font-size:14px;font-weight:700;letter-spacing:2px;opacity:.9;}
.hdr-phone{font-size:10px;color:#8495A8;text-decoration:none;font-weight:500;}
.hdr-row{padding:8px 18px 12px;display:flex;align-items:center;gap:10px;}
.av{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#A8E063,#2DD87B 40%,#0FCCB0 70%,#0A8F7A);flex-shrink:0;box-shadow:0 0 12px rgba(45,216,123,0.4);position:relative;overflow:hidden;}
.av::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 60% 70%,transparent 30%,rgba(0,0,0,0.15));}
.av-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-15deg);width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.5);background:radial-gradient(circle at 40% 40%,rgba(255,255,255,0.25),transparent 70%);}
.hdr-name{color:#FFF;font-size:16px;font-weight:700;}
.hdr-ai{font-size:9px;font-weight:700;color:#0FCCB0;background:rgba(15,204,176,.12);padding:2px 6px;border-radius:6px;letter-spacing:.5px;}
.hdr-sub{color:#8495A8;font-size:10px;font-weight:500;margin-top:1px;}
.dot-live{width:6px;height:6px;border-radius:50%;background:#2DD87B;box-shadow:0 0 6px #2DD87B;}
.msgs{flex:1;overflow-y:auto;padding:18px 14px 120px;-webkit-overflow-scrolling:touch;}
.msg{display:flex;gap:10px;margin-bottom:14px;}
.msg-u{justify-content:flex-end;}
.msg-av{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#A8E063,#2DD87B 40%,#0FCCB0 70%,#0A8F7A);flex-shrink:0;position:relative;overflow:hidden;}
.msg-av::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 60% 70%,transparent 30%,rgba(0,0,0,0.15));}
.bub{max-width:82%;padding:12px 16px;font-size:14px;line-height:1.6;word-break:break-word;}
.bub-h{border-radius:18px 18px 18px 4px;background:#FFF;color:#1A202C;box-shadow:0 1px 6px rgba(0,0,0,.05);border:1px solid #E8EDF2;}
.bub-u{border-radius:18px 18px 4px 18px;background:#1565C0;color:#FFF;box-shadow:0 2px 10px rgba(21,101,192,.18);max-width:72%;}
.typing{display:flex;gap:5px;padding:8px 0;align-items:center;}
.typing span{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#0FCCB0,#2DD87B);animation:bp 1.4s ease-in-out infinite;}
.typing span:nth-child(2){animation-delay:.18s;}
.typing span:nth-child(3){animation-delay:.36s;}
@keyframes bp{0%,60%,100%{transform:translateY(0) scale(.85);opacity:.35}30%{transform:translateY(-5px) scale(1);opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px;padding-left:44px;}
.chip{padding:8px 16px;border-radius:22px;border:1.5px solid #C5CED8;background:#FFF;color:#1A202C;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.chip:hover{background:#E8EDF2;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.12);}
.chip-g{background:#2DD87B;color:#FFF;border-color:#2DD87B;}
.chip-g:hover{background:#00B248;}
.chip-a{background:#1565C0;color:#FFF;border-color:#1565C0;}
.chip-a:hover{background:#0D47A1;}
.chip-on{background:#1565C0;color:#FFF;border-color:#1565C0;}
.svc{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;cursor:pointer;background:#FFF;border:1.5px solid #C5CED8;transition:all .15s;width:100%;text-align:left;font-family:'DM Sans',sans-serif;margin-bottom:8px;}
.svc:hover{background:#F4F7FA;}
.svc-sel{background:#E8F5E9;border-color:#2DD87B;}
.svc-name{font-size:13px;font-weight:600;color:#1A202C;}
.svc-desc{font-size:11px;color:#8495A8;margin-top:1px;}
.count-card{border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);border:1px solid #E8EDF2;}
.count-top{background:linear-gradient(135deg,#070F1A 0%,#0A1628 50%,#0F2847 100%);padding:22px 20px;position:relative;overflow:hidden;}

.count-num{color:#FFF;font-size:38px;font-weight:700;margin-top:6px;transition:all .3s;}
.count-sub{color:#8495A8;font-size:14px;font-weight:400;}
.count-meta{display:flex;gap:16px;margin-top:12px;}
.count-ml{font-size:10px;color:#8495A8;text-transform:uppercase;letter-spacing:.8px;}
.count-mv{font-size:13px;color:#FFF;font-weight:600;margin-top:2px;}
.count-bot{padding:16px 20px;background:#FFF;}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.tags-label{font-size:10px;font-weight:700;color:#8495A8;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.tag{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;background:#F4F7FA;color:#4A5568;border:1px solid #E8EDF2;}
.intel{display:flex;align-items:center;gap:10px;padding:10px 14px;background:linear-gradient(135deg,#F0FFF4,#E8F5E9);border-radius:10px;border:1px solid #C8E6C9;margin-top:10px;}
.intel-dot{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#0FCCB0,#2DD87B,#A8E063);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#FFF;font-size:12px;font-weight:700;}
.intel-txt{font-size:12px;color:#2E7D32;font-weight:500;line-height:1.4;}
.intel-sub{font-size:11px;color:#558B2F;}
.refine-section{padding-left:44px;margin-top:8px;}
.refine-count{display:flex;align-items:baseline;gap:8px;padding:12px 16px;background:linear-gradient(135deg,#070F1A,#0F2847);border-radius:12px;margin-bottom:12px;}
.refine-num{font-size:32px;font-weight:700;color:#2DD87B;transition:all .3s;}
.refine-num.updating{opacity:.4;}
.refine-sub{font-size:12px;color:#8495A8;}
.refine-label{font-size:11px;font-weight:700;color:#8495A8;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.inp-bar{position:absolute;bottom:0;left:0;right:0;background:#FFF;border-top:1px solid #E8EDF2;}
.inp-row{padding:10px 14px;display:flex;gap:8px;align-items:center;}
.inp-row input{flex:1;padding:11px 16px;border-radius:24px;border:1.5px solid #C5CED8;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.inp-row input:focus{border-color:#0FCCB0;}
.inp-btn{width:42px;height:42px;border-radius:50%;border:none;background:linear-gradient(135deg,#0FCCB0,#2DD87B,#A8E063);color:#FFF;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(45,216,123,.3);flex-shrink:0;}

.tagline span{font-size:9px;font-weight:600;letter-spacing:3px;color:#C5CED8;text-transform:lowercase;}
.foot{position:absolute;bottom:0;left:0;right:0;padding:10px 16px;background:#FFF;border-top:1px solid #E8EDF2;display:flex;justify-content:center;}
.foot span{font-size:9px;font-weight:600;letter-spacing:3px;color:#C5CED8;text-transform:lowercase;}
.log-panel{background:#0A1628;padding:16px;border-bottom:1px solid rgba(79,195,247,0.15);max-height:280px;overflow-y:auto;}

function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+"M":n>=1e3?(n/1e3).toFixed(1)+"K":String(n);}

function getCount(geography, selections){
  var body = {tableName:"consumer"};
  if(geography) body.geography = geography;
  if(selections && selections.length > 0) body.selections = selections;
  return fetch(API+"/api/count",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();});
}

function buildSelections(){
  var d = IND[S.ind];
  var sels = d.baseline.map(function(b){return{id:b.id,description:b.d,values:b.v};});
  var replaced = {};
  // Check for replacements
  d.refinements.forEach(function(r){
    if(r.active && r.replaces) replaced[r.replaces] = true;
  });
  // Remove replaced baseline selections
  if(Object.keys(replaced).length > 0){
    sels = sels.filter(function(s){return !replaced[s.id];});
  }
  // Add active refinements
  d.refinements.forEach(function(r){
    if(r.active){
      sels.push({id:r.id,description:r.label,values:r.v});
    }
  });
  return sels;
}

function getActiveFilterLabels(){
  var d = IND[S.ind];
  var labels = d.baseFilters.slice();
  var replacedBase = {};
  d.refinements.forEach(function(r){
    if(r.active && r.replaces){
      // Find which base filter to replace by matching the API id
      d.baseline.forEach(function(b,i){
        if(b.id === r.replaces) replacedBase[i] = r.label;
      });
    }
  });
  // Apply replacements
  Object.keys(replacedBase).forEach(function(i){
    labels[parseInt(i)] = replacedBase[parseInt(i)];
  });
  // Add non-replacing refinements
  d.refinements.forEach(function(r){
    if(r.active && !r.replaces) labels.push(r.label);
  });
  return labels;
}

function getBaselineCommentary(industry, count, geo, detail) {
  var tips = INDUSTRY_TIPS[industry] || INDUSTRY_TIPS["Other"];
  var intro = tips.intro[Math.floor(Math.random() * tips.intro.length)];
  var sizeComment = "";
  if (count > 500000) {
    sizeComment = tips.bigCount;
  } else if (count > 50000) {
    sizeComment = "Solid audience size. Big enough to segment across channels, focused enough to drive real response rates.";
  } else if (count > 5000) {
    sizeComment = "Good volume for a targeted campaign. This is a workable audience for direct mail, email, or digital.";
  } else if (count > 500) {
    sizeComment = tips.smallCount;
  } else {
    sizeComment = "That is a very niche audience. High quality, but if you need more volume we can loosen the geography or adjust filters.";
  }
  return { intro: intro, sizeComment: sizeComment, seasonal: tips.seasonal, refineTip: tips.refineTip };
}

function getRefinementCommentary(industry, oldCount, newCount, filterLabel, added) {
  var tips = INDUSTRY_TIPS[industry] || INDUSTRY_TIPS["Other"];
  if (!added) {
    // Filter removed
    if (newCount > oldCount * 1.5) {
      return "Removing <strong>" + filterLabel + "</strong> opened things up significantly. " + fmt(newCount - oldCount) + " more prospects now in your audience.";
    }
    return "";
  }
  // Filter added
  var dropPct = oldCount > 0 ? Math.round((1 - newCount / oldCount) * 100) : 0;
  if (newCount === 0) {
    return "That filter combination returned zero results. Try removing <strong>" + filterLabel + "</strong> or loosening another filter.";
  }
  if (dropPct > 70) {
    return "That is a significant narrowing. <strong>" + filterLabel + "</strong> cut your audience by " + dropPct + "%. Very targeted, but make sure you have enough volume for your campaign goals.";
  }
  if (dropPct > 40) {
    return "Good refinement. <strong>" + filterLabel + "</strong> trimmed about " + dropPct + "% of the audience. What is left is a much stronger fit for your business.";
  }
  if (dropPct > 15) {
    return "<strong>" + filterLabel + "</strong> tightened things up by about " + dropPct + "%. You are getting closer to your ideal prospect.";
  }
  if (dropPct > 0) {
    return "<strong>" + filterLabel + "</strong> made a small adjustment. Most of your audience already met that criteria, which is a good sign.";
  }
  return "";
}

function getLockCommentary(industry, count) {
  var tips = INDUSTRY_TIPS[industry] || INDUSTRY_TIPS["Other"];
  var lines = [];
  if (count > 100000) {
    lines.push("With " + fmt(count) + " prospects, you have room for a multi-channel campaign. Consider starting with digital to build awareness, then following up with direct mail to your most engaged segments.");

  } else if (count > 1000) {

}

      try {
        var rRes = await fetch(API + "/api/radius/" + centerZip + "/" + miles);
        var rData = await rRes.json();
        if(rData.zips && rData.zips.length > 1){
          S.geoObj = {id:"zip",description:"Zip Codes",values:rData.zips.map(function(z){return{id:z,description:"code"};})};
          await say("Found <strong>" + rData.zips.length + " ZIP codes</strong> in your radius. Pulling counts...", 600);
        } else {
          S.geoObj = {id:"zip",description:"Zip Codes",values:[{id:centerZip,description:"code"}]};
        }
      } catch(e) {
        S.geoObj = {id:"zip",description:"Zip Codes",values:[{id:centerZip,description:"code"}]};
      }
      await fetchBaseline();
    } else if(S.geo === 'ZIP Code'){
      S.geoObj = {id:"zip",description:"Zip Codes",values:[{id:val,description:"code"}]};
      await fetchBaseline();
    } else if(S.geo === 'Multi-ZIP'){
      var zips = val.split(/[,\s]+/).filter(function(z){return z.length>=5;});
      S.geoObj = {id:"zip",description:"Zip Codes",values:zips.map(function(z){return{id:z.trim(),description:"code"};})};
      await fetchBaseline();
    } else if(S.geo === 'State'){
      S.geoObj = {id:"state",description:"State",values:[{id:val.toUpperCase(),description:val}]};
      await fetchBaseline();
    } else {
      await fetchBaseline();
    }
  } else if(S.step === 'contact'){
    await submitContact(val);
  }
}

async function fetchBaseline(){
  await say("Pulling your audience data...", 800);
  try{
    var d = IND[S.ind];
    var sels = d.baseline.map(function(b){return{id:b.id,description:b.d,values:b.v};});
    var result = await getCount(S.geoObj, sels);
    if(result.success){
      S.cnt = result.count; S.cntId = result.countId;
      d.refinements.forEach(function(r){r.active=false;});
      S.bLog = {industry:S.ind,geo:S.geo||'Nationwide',detail:S.det,count:result.count,countId:result.countId,filters:d.baseFilters.slice(),propensity:d.p,personicx:d.px,services:[],contact:null};
      var c = getBaselineCommentary(S.ind, result.count, S.geo, S.det);
      await say("Your starting audience: <strong>"+fmt(result.count)+" prospects</strong> matching <strong>"+d.qp+"</strong> in "+(S.det||'all US markets')+".", 700);
      await say(c.sizeComment, 800);
      await say(c.refineTip + " Toggle any filter below and the count updates live.", 700);
      S.step = 'refine'; render();
    } else {
      await say("I was not able to get a count for that geography. Try a different area or call us at <strong>(800) 399-8611</strong>.", 800);
      S.step = 'geo'; render();
    }
  } catch(e){
    await say("I had trouble reaching our data engine. Call <strong>(800) 399-8611</strong> or try again.", 800);
    S.step = 'geo'; render();
  }
}

async function toggleRef(idx){
  if(S.updating) return;
  var d = IND[S.ind];
  var ref = d.refinements[idx];
  var oldCount = S.cnt;
  var wasActive = ref.active;

  // Handle "replaces" logic
  if(!ref.active && ref.replaces){
    d.refinements.forEach(function(r,i){
      if(i !== idx && r.active && r.replaces === ref.replaces) r.active = false;
      if(i !== idx && r.active && r.id === ref.id && r.replaces) r.active = false;
    });
  }
  if(!ref.active && !ref.replaces){
    d.refinements.forEach(function(r,i){
      if(i !== idx && r.active && r.replaces === ref.id) r.active = false;
    });
  }

  ref.active = !ref.active;
  S.updating = true; render();

  try{
    var sels = buildSelections();
    var result = await getCount(S.geoObj, sels);
    if(result.success){
      S.cnt = result.count; S.cntId = result.countId;
      if(S.bLog){
        S.bLog.count = result.count;
        S.bLog.countId = result.countId;
        S.bLog.filters = getActiveFilterLabels();
      }
      // Add commentary on significant changes
      var comment = getRefinementCommentary(S.ind, oldCount, result.count, ref.label, !wasActive);
      if(comment){
        S.updating = false; render();
        await say(comment, 600);
        return;
      }
    }
  } catch(e){
    console.error("Refinement error:", e);
  }
  S.updating = false; render();
}

async function lockAudience(){
  var labels = getActiveFilterLabels();
  addUser("Locked audience: "+fmt(S.cnt)+" prospects");
  var lockLines = getLockCommentary(S.ind, S.cnt);
  await say("That is <strong>"+fmt(S.cnt)+" prospects</strong> locked and enhanced with USADATA intelligence for maximum response.", 700);
  for(var i = 0; i < lockLines.length; i++){
    await say(lockLines[i], 800);
  }
  await say("Would any of these USADATA services help you activate this audience?", 700);
  S.step = 'services'; render();
}

function toggleSvc(id){
  var idx = S.svs.indexOf(id);
  if(idx>-1) S.svs.splice(idx,1); else S.svs.push(id);
  render();
}

async function submitSvcs(){
  if(S.svs.length>0){
    var names = S.svs.map(function(id){return SVCS.find(function(s){return s.id===id;}).l;});
    addUser("Interested in: "+names.join(", "));
    if(S.bLog) S.bLog.services = names;
    await say("Great choices. I will flag <strong>"+names.join("</strong>, <strong>")+"</strong> for your specialist.", 800);
  } else {
    addUser("Just the audience list");
    await say("No problem, we can explore those later.", 500);
  }
  S.showInp = true;
  await say('Just need your contact info and a Data Specialist will follow up within the hour:<div style="margin-top:10px;background:#F4F7FA;border-radius:10px;padding:12px 14px;font-size:13px;border:1px solid #E8EDF2"><strong>Name</strong>, <strong>Email</strong>, and <strong>Company</strong></div>', 700);
  S.step = 'contact'; render();
  setTimeout(function(){var el=document.getElementById('inp');if(el)el.focus();},100);
}

async function submitContact(info){
  if(S.bLog) S.bLog.contact = info;
  console.log("=== HAILEY HANDOFF ===", JSON.stringify(S.bLog, null, 2));
  await say("Perfect. A USADATA Data Specialist will be in touch shortly to finalize your <strong>"+fmt(S.cnt)+"</strong> prospect audience"+(S.svs.length>0?" and discuss your campaign services":"")+".", 900);
  await say("You can also reach us at <strong>(800) 399-8611</strong> or visit <strong>usadata.com</strong>. Thanks for using Hailey!", 700);
  S.step = 'done'; render();
}

async function restart(){
  S = {step:"welcome",msgs:[],ind:null,geo:null,geoObj:null,det:"",cnt:null,cntId:null,svs:[],typing:false,showInp:false,bLog:null,showLog:false,refining:false,updating:false,activeRefinements:[]};
  render(); await init();
}

function toggleLog(){ S.showLog = !S.showLog; render(); }

init();
</script>
